<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<style>
    main¨{
        display: grid;
        width: 100%;
        justify-content: center;
    }
    form{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        background-color: #FAFAFA;
        width: 90%;
        padding: 10px;
    }
</style>
<body>
    <main>
        <h1>DATOS DEL PACIENTE</h1>
        <form>
            <label for="inDNI">DNI</label>
            <input type="text" id="inDNI">
            <label for="inFoto">Foto</label>
            <input type="file" id="inFoto">
            <label for="inNombre">Nombre:</label>
            <input type="text" placeholder="Ingresa tu Nombre...">
            <label for="inApellido">Apellido:</label>
            <input type="text" placeholder="Ingresa tu Apellido...">
            <label for="inFecha de Nacimiento">Fecha de Nacimiento</label>
            <input type="date">
            <label for="inSexo">Sexo:</label>
            <select>
                <option value="">Seleccione</option>
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
            </select>
            <label for="inNombre">Nombre del Representante:</label>
            <input type="text" id="inNombre">
            <label for="inTelefono">Telefono:</label>
            <input type="text" id="inTelefono">
            <label for="inSala">Sala:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="Emergencia">Emergencia</option>
                <option value="Sala A">Sala A</option>
                <option value="Laboratorio">Laboratorio</option>
                <option value="Rayos X">Rayos X</option>
                <option value="Hospitalización">Hospitalización</option>
            </select>
            <label for="inDirección">Dirección:</label>
            <input type="text" id="inDirección">
            <label for="inPaís">País:</label>
            <select>
                <option value="">Seleccione</option>
                <option value="Colombia">Colombia</option>
                <option value="Venezuela">Venezuela</option>
                <option value="Ecuador">Ecuador</option>
                <option value="Perú">Perú</option>
                <option value="Panamá">Panamá</option>
                <option value="Brasil">Brasil</option>
            </select>
            <label for="inDepartamento">Departamento:</label>
            <input type="text" id="inDepartamento">
            <label for="inProvincia">Provincia:</label>
            <input type="text" id="inProvincia">
            <label for="inDistrito">Distrito</label>
            <input type="text" id="inDistrito">
            <label for="inEstadoCivil">Estado Civil:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="Casado/a">Casado/a</option>
                <option value="Soltero/a">Soltero/a</option>
                <option value="Viudo/a">Viudo/a</option>
                <option value="Unión Libre">Unión Libre</option>
                <option value="Separado/a">Separado/a</option>
                <option value="Divorciado/a">Divorciado/a</option>
            </select>
            <label for="inEmergencia">Emergencia:</label>
            <textarea cols="20" rows="5"></textarea>
            <label for="inGrupoSanguineo">Grupo Sanguineo:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="A+">A+</option>
                <option value="A+">A+</option>
                <option value="B+">B+</option>
                <option value="B+">B+</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
             </select>
             <label for="inVIH">VIH:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="Si">Si</option>
                <option value="No">No</option>
             </select>
             <label for="inOcupación">Ocupación</label>
             <textarea cols="10" rows="5"></textarea>
              <label for="inPeso">Peso</label>
             <textarea cols="5" rows="2"></textarea>
              <label for="inTalla">Talla</label>
             <textarea cols="5" rows="2"></textarea>
             <label for="inAlérgico">Alérgico</label>
             <textarea cols="20" rows="5"></textarea>
             <label for="inMedicamento Que Toma Actualmente">Medicamento Que Toma Actualmente</label>
             <textarea cols="15" rows="8"></textarea>
             <label for="inEnfermedad Que Tiene">Enfermedad Que Tiene</label>
             <textarea cols="20" rows="8"></textarea>
             <div class="form-buttons">
    <button type="submit" class="btn-registro">Registrar Paciente</button>
    <button type="reset" class="btn-limpiar">Limpiar Formulario</button>
</div>

<style>
    .form-buttons {
        display: flex;
        gap: 15px; /* Espacio entre botones */
        margin-top: 20px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        font-family: Arial, sans-serif;
    }

    .btn-registro {
        background-color: #2e72cc; /* Verde éxito */
        color: white;
    }

    .btn-registro:hover {
        background-color: #2e72cc;
    }

    .btn-limpiar {
        background-color: #2e72cc; /* Rojo alerta */
        color: white;
    }

    .btn-limpiar:hover {
        background-color: #2e72cc;
    }
</style>
        </form>
    </main>
</body>
</html>
