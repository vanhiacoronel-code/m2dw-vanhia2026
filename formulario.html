<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<style>
    main¨{
        display: grid;
        width: 100%;
        justify-content: center;
    }
    form{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        background-color: #FAFAFA;
        width: 90%;
        padding: 10px;
    }
</style>
<body>
    <main>
        <h1>DATOS DEL PACIENTE</h1>
        <form>
            <label for="inDNI">DNI</label>
            <input type="text" id="inDNI">
            <label for="inFoto">Foto</label>
            <input type="file" id="inFoto">
            <label for="inNombre">Nombre:</label>
            <input type="text" placeholder="Ingresa tu Nombre...">
            <label for="inApellido">Apellido:</label>
            <input type="text" placeholder="Ingresa tu Apellido...">
            <label for="inFecha de Nacimiento">Fecha de Nacimiento</label>
            <input type="date">
            <label for="inSexo">Sexo:</label>
            <select>
                <option value="">Seleccione</option>
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
                <option value="Prefiero no decirlo">Prefiero no decirlo</option>
            </select>
            <label for="inNombre">Nombre del Representante:</label>
            <input type="text" id="inNombre">
            <label for="inTelefono">Telefono:</label>
            <input type="text" id="inTelefono">
            <label for="inSala">Sala:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="Sala 1">Sala 1</option>
                <option value="Sala 2">Sala 2</option>
                <option value="Sala 3">Sala 3</option>
            </select>
            <label for="inDirección">Dirección:</label>
            <input type="text" id="inDirección">
            <label for="inPaís">País:</label>
            <select>
                <option value="">Seleccione</option>
                <option value="Argentina">Argentina</option>
                <option value="Bolivia">Bolivia</option>
                <option value="Colombia">Colombia</option>
                <option value="Venezuela">Venezuela</option>
            </select>
            <label for="inDepartamento">Departamento:</label>
            <input type="text" id="inDepartamento">
            <label for="inProvincia">Provincia:</label>
            <input type="text" id="inProvincia">
            <label for="inDistrito">Distrito</label>
            <input type="inDistrito" id="Distrito">
            <label for="inEstadoCivil">Estado Civil:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="Casado/a">Casado/a</option>
                <option value="Soltero/a">Soltero/a</option>
            </select>
            <label for="inEmergencia">Emergencia:</label>
            <textarea cols="20" rows="5"></textarea>
            <label for="inGrupoSanguineo">Grupo Sanguineo:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
             </select>
             <label for="inVIH">VIH:</label>
             <select>
                <option value="">Seleccione</option>
                <option value="Si">Si</option>
                <option value="No">No</option>
             </select>
             <label for="inOcupación">Ocupación</label>
        </form>
    </main>
</body>
</html>
